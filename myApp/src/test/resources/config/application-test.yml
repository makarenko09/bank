spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      maximum-pool-size: 2
    password: ''
    url: jdbc:tc:postgresql:18.2:///bank?TC_TMPFS=/testtmpfs:rw
    username: bank
  liquibase:
    contexts: test
  main:
    banner-mode: 'off'
    allow-bean-definition-overriding: true
  security:
    oauth2:
      client:
        provider:
          oidc:
            issuer-uri: http://DO_NOT_CALL:9080/realms/seed4j
logging:
  config: classpath:logback.xml
server:
  port: 0
keycloak:
  admin:
    server-url: http://localhost:9081
    admin-realm: master
    realm: seed4j
    client-id: admin-cli
    grant-type: client_credentials
