services:
  bankapp:
    image: bankcards-app:this
    container_name: bank_app_runner
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/bank
      SPRING_DATASOURCE_USERNAME: bank
      SPRING_DATASOURCE_PASSWORD:
      # OIDC issuer - внутри Docker сети используем hostname keycloak и внутренний порт 8080
      # SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_OIDC_ISSUER_URI: http://keycloak:8080/realms/seed4j
      # Базовый URL для OAuth2 redirect (браузер → app)
      # SPRING_SECURITY_OAUTH2_CLIENT_BASE_URI: http://localhost:8080
      # Redirect URI для OAuth2 callback
      # SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_REDIRECT_URI: "{baseUrl}/login/oauth2/code/oidc"
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgresql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/management/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped