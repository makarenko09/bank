# docker-compose.dev.yml
# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
services:
  postgresql:
    image: postgres:18.2
    # volumes:
    #   - ~/volumes/seed4j/bank/postgresql/:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=bank
      - POSTGRES_PASSWORD=
      - POSTGRES_HOST_AUTH_METHOD=trust
    # If you want to expose these ports outside your dev PC,
    # remove the "127.0.0.1:" prefix
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bank" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s # время на "разогрев" перед началом проверок

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.3
    command: 'start-dev --import-realm'
    volumes:
      - ./keycloak-realm-config:/opt/keycloak/data/import
    environment:
      - KC_DB=dev-file #in memory: https://www.keycloak.org/server/db#_supported_databases
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_FEATURES=scripts
      - KC_HTTP_PORT=9081
      - KC_HEALTH_ENABLED=true
    # If you want to expose these ports outside your dev PC,
    # remove the "127.0.0.1:" prefix
    # FIXME # - ready to prod: \n
    #    depends_on:
    #      postgresql:
    #        condition: service_healthy
    ports:
      - '127.0.0.1:9081:9081'
    healthcheck:
      test: [ 'CMD-SHELL', '[ -f /tmp/Seed4JKeycloakHealthCheck.java ] || echo "public class Seed4JKeycloakHealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(java.net.HttpURLConnection.HTTP_OK == ((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() ? 0 : 1); } }" > /tmp/Seed4JKeycloakHealthCheck.java && java /tmp/Seed4JKeycloakHealthCheck.java http://localhost:9081/health/live' ]
      interval: 5s
      timeout: 5s
      retries: 30
    labels:
      org.springframework.boot.readiness-check.tcp.disable: true

name: bank_rest
